{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">
  <div class="card shadow-lg border-0" style="width: 100%; max-width: 420px; border-radius: 16px;">

    <!-- Logo / Brand -->
    <div class="text-center mt-4">
      <img src="{% static 'assets/images/logo.png' %}" alt="Velora Jewelry" style="height: 80px;">
      <h4 class="mt-3" style="letter-spacing: 1px;">Velora Jewelry</h4>
      <p class="text-muted small">Sign in to your account</p>
    </div>

    <div class="card-body px-4 py-3">

      {% if form.errors %}
        <div class="alert alert-danger">
          Invalid email or password. Please try again.
        </div>
      {% endif %}

      <form method="post">
        {% csrf_token %}

        <!-- Email -->
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" name="email" class="form-control" placeholder="you@example.com" required>
        </div>

        <!-- Password -->
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input type="password" name="password" class="form-control" placeholder="••••••••" required>
        </div>

        <!-- Button -->
        <button type="submit" class="btn w-100 text-white"
                style="background: linear-gradient(135deg, #b08d57, #d4af37); border: none;">
          Sign In
        </button>

      </form>
    </div>

    <!-- Footer -->
    <div class="text-center pb-3">
      <small class="text-muted">
        Don’t have an account?
        <a href="{% url 'users:register' %}" class="text-decoration-none">Create one</a>
      </small>
    </div>

  </div>
</div>
{% endblock %}
